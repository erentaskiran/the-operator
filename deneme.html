<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>InterrogationSound — Demo</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: monospace;
        background: #111;
        color: #ccc;
        padding: 2rem;
      }
      h1 {
        font-size: 13px;
        letter-spacing: 3px;
        color: #888;
        margin-bottom: 1.5rem;
      }
      .section {
        margin-bottom: 1.5rem;
      }
      .section h2 {
        font-size: 10px;
        letter-spacing: 2px;
        color: #555;
        margin-bottom: 0.75rem;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 1px;
        padding: 6px 14px;
        background: transparent;
        border: 1px solid #333;
        color: #aaa;
        cursor: pointer;
      }
      button:hover {
        border-color: #666;
        color: #fff;
      }
      button.active {
        border-color: #7f77dd;
        color: #7f77dd;
      }
      .log {
        background: #0a0a0a;
        border: 1px solid #222;
        padding: 12px;
        font-size: 11px;
        height: 120px;
        overflow-y: auto;
        color: #555;
      }
      .log .line {
        margin-bottom: 3px;
      }
      .log .line span {
        color: #7f77dd;
      }
      input[type='range'] {
        width: 140px;
        vertical-align: middle;
      }
      .ctrl-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
        font-size: 11px;
      }
      .ctrl-row label {
        width: 90px;
        color: #555;
        letter-spacing: 1px;
      }
      .val {
        width: 28px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <h1>[ INTERROGATION-SOUND.JS — DEMO ]</h1>

    <div class="section">
      <h2>LIFECYCLE</h2>
      <div class="btn-row">
        <button id="btnPlay">► PLAY</button>
        <button id="btnPause">⏸ PAUSE</button>
        <button id="btnResume">⏵ RESUME</button>
        <button id="btnStop">■ STOP</button>
      </div>
    </div>

    <div class="section">
      <h2>MOODS</h2>
      <div class="btn-row" id="moodBtns"></div>
    </div>

    <div class="section">
      <h2>INTERROGATION MODS</h2>
      <div class="btn-row" id="modBtns"></div>
      <div class="ctrl-row" style="margin-top: 8px">
        <label>INTENSITY</label>
        <input type="range" id="modIntensity" min="0" max="100" value="65" step="1" />
        <span class="val" id="modIntensityVal">65</span>
      </div>
    </div>

    <div class="section">
      <h2>TENSION & VOLUME</h2>
      <div class="ctrl-row">
        <label>TENSION</label>
        <input type="range" id="tension" min="0" max="100" value="0" step="5" />
        <span class="val" id="tensionVal">0</span>
        <button id="btnEsc">⚡ ESCALATE</button>
      </div>
      <div class="ctrl-row">
        <label>VOLUME</label>
        <input type="range" id="volume" min="0" max="100" value="75" step="1" />
        <span class="val" id="volumeVal">75</span>
      </div>
    </div>

    <div class="section">
      <h2>LAYERS</h2>
      <div id="layerControls"></div>
    </div>

    <div class="section">
      <h2>ONE-SHOT TRIGGERS</h2>
      <div class="btn-row" id="triggerBtns"></div>
    </div>

    <div class="section">
      <h2>EVENT LOG</h2>
      <div class="log" id="log"></div>
    </div>

    <script src="js/interrogationSound.js"></script>
    <script>
      const scene = new InterrogationSound({ volume: 0.75, mood: 'tense', autoEvents: true });

      // ── Event log
      function log(type, msg) {
        const d = document.getElementById('log');
        const line = document.createElement('div');
        line.className = 'line';
        const now = new Date().toLocaleTimeString('tr', { hour12: false });
        line.innerHTML = `<span>[${type}]</span> ${now} — ${msg}`;
        d.prepend(line);
      }

      scene.on('play', (e) => log('PLAY', `mood: ${e.mood}`));
      scene.on('stop', () => log('STOP', 'scene cleared'));
      scene.on('pause', () => log('PAUSE', 'audio suspended'));
      scene.on('resume', () => log('RESUME', 'audio resumed'));
      scene.on('moodChange', (e) => log('MOOD', `${e.from} → ${e.to}`));
      scene.on('tensionChange', (e) => log('TENSION', `${e.from} → ${e.to}`));
      scene.on('layerChange', (e) => log('LAYER', `${e.id} = ${e.volume}`));
      scene.on('layerToggle', (e) => log('TOGGLE', `${e.id} ${e.enabled ? 'ON' : 'OFF'}`));
      scene.on('trigger', (e) => log('TRIGGER', e.id));
      scene.on('event', (e) => log('SCENE', e.label));
      scene.on('volumeChange', (e) => log('VOL', e.volume));
      scene.on('modChange', (e) => log('MOD', `${e.from.id} → ${e.to.id} @${e.to.intensity}`));
      scene.on('modIntensityChange', (e) => log('MOD', `${e.mod} intensity ${e.from} → ${e.to}`));

      // ── Lifecycle
      document.getElementById('btnPlay').onclick = () => scene.play();
      document.getElementById('btnPause').onclick = () => scene.pause();
      document.getElementById('btnResume').onclick = () => scene.resume();
      document.getElementById('btnStop').onclick = () => scene.stop();

      // ── Moods
      const moods = scene.getMoods();
      moods.forEach((m) => {
        const b = document.createElement('button');
        b.textContent = m.id.toUpperCase();
        b.onclick = () => {
          scene.setMood(m.id);
          document
            .querySelectorAll('#moodBtns button')
            .forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
        };
        if (m.id === 'tense') b.classList.add('active');
        document.getElementById('moodBtns').appendChild(b);
      });

      // ── Interrogation mods
      [
        { id: 'excited', label: 'NABIZ ARTTI' },
        { id: 'afraid', label: 'KORKTU' },
        { id: 'both', label: 'IKISI BIRDEN' },
      ].forEach((mod) => {
        const b = document.createElement('button');
        b.textContent = mod.label;
        b.onclick = () => {
          const intensity = +document.getElementById('modIntensity').value;
          scene.setMod(mod.id, intensity);
          const state = scene.getState();
          document.getElementById('modIntensity').value = state.mod.intensity;
          document.getElementById('modIntensityVal').textContent = state.mod.intensity;
          document.querySelectorAll('#modBtns button').forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
        };
        document.getElementById('modBtns').appendChild(b);
      });

      document.getElementById('modIntensity').oninput = (e) => {
        const v = +e.target.value;
        document.getElementById('modIntensityVal').textContent = v;
        scene.setModIntensity(v);
      };

      // ── Tension
      document.getElementById('tension').oninput = (e) => {
        const v = +e.target.value;
        document.getElementById('tensionVal').textContent = v;
        scene.setTension(v);
      };
      document.getElementById('btnEsc').onclick = () => {
        scene.escalate(20);
        const state = scene.getState();
        document.getElementById('tension').value = state.tension;
        document.getElementById('tensionVal').textContent = state.tension;
      };

      // ── Volume
      document.getElementById('volume').oninput = (e) => {
        document.getElementById('volumeVal').textContent = e.target.value;
        scene.setVolume(+e.target.value);
      };

      // ── Layer controls
      const layers = scene.getLayers();
      layers.forEach((l) => {
        const row = document.createElement('div');
        row.className = 'ctrl-row';

        const label = document.createElement('label');
        label.textContent = l.id.toUpperCase();

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = 0;
        slider.max = 100;
        slider.value = l.volume;
        slider.step = 1;
        slider.oninput = (e) => {
          val.textContent = e.target.value;
          scene.setLayer(l.id, +e.target.value);
        };

        const val = document.createElement('span');
        val.className = 'val';
        val.textContent = l.volume;

        const tog = document.createElement('button');
        tog.textContent = l.enabled ? 'ON' : 'OFF';
        tog.classList.toggle('active', !!l.enabled);
        tog.onclick = () => {
          const on = tog.textContent === 'ON';
          scene.toggleLayer(l.id, !on);
          tog.textContent = on ? 'OFF' : 'ON';
          tog.classList.toggle('active', !on);
        };

        row.append(label, slider, val, tog);
        document.getElementById('layerControls').appendChild(row);
      });

      // ── Trigger buttons
      [
        'glass',
        'metal',
        'chair',
        'slam',
        'radio',
        'clock',
        'pulse',
        'string',
        'organ',
        'air',
      ].forEach((id) => {
        const b = document.createElement('button');
        b.textContent = 'TRIGGER ' + id.toUpperCase();
        b.onclick = () => scene.trigger(id);
        document.getElementById('triggerBtns').appendChild(b);
      });
    </script>
  </body>
</html>
